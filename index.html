<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyroX Bot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
text-align:center;
}

.hero{
padding:100px 20px;
}

h1{
font-size:60px;
background:linear-gradient(90deg,#5865F2,#9b59ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
margin-top:15px;
font-size:18px;
color:#bdbdbd;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 20px #5865F2;
}

.btn:hover{
transform:scale(1.05);
}

.features{
padding:70px 20px;
}

.card{
background:#161616;
margin:15px auto;
padding:20px;
max-width:400px;
border-radius:15px;
border:1px solid #2a2a2a;
}

footer{
padding:30px;
color:#888;
}
</style>
</head>

<body>

<div class="hero">
<h1>ZyroX</h1>
<p>Advanced Discord Music & Utility Bot</p>

<a class="btn"
href="https://discord.com/oauth2/authorize?client_id=1514253026964279377&permissions=8&integration_type=0&scope=bot+applications.commands">
Invite ZyroX
</a>
</div>

<div class="features">
<h2>Features</h2>

<div class="card">
🎵 High Quality Music
</div>

<div class="card">
⚡ Fast Response
</div>

<div class="card">
🛠 Utility Commands
</div>

<div class="card">
🔒 24/7 Reliable
</div>

</div>

<footer>
© 2026 ZyroX Bot
</footer>

</body>
</html>
