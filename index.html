<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyroX Bot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:
radial-gradient(circle,#5865F2 0%,transparent 20%),
radial-gradient(circle,#9b59ff 0%,transparent 20%);
background-size:400px 400px;
animation:spin 25s linear infinite;
opacity:.25;
z-index:-1;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.hero{
padding:120px 20px;
}

h1{
font-size:70px;
background:linear-gradient(
90deg,
#5865F2,
#9b59ff,
#5865F2
);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 4s linear infinite;
}

@keyframes glow{
0%{background-position:0% center;}
100%{background-position:200% center;}
}

.subtitle{
margin-top:15px;
font-size:20px;
color:#bdbdbd;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:#5865F2;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:12px;
box-shadow:0 0 20px #5865F2;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.features{
padding:60px 20px;
}

.features h2{
margin-bottom:25px;
}

.card{
max-width:450px;
margin:15px auto;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
transition:.3s;
font-size:18px;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:28px;
height:28px;
vertical-align:middle;
margin-right:10px;
}

footer{
margin-top:50px;
padding:20px;
color:#888;
}
</style>
</head>

<body>

<div class="hero">
<h1>ZyroX</h1>

<p class="subtitle">
Advanced Discord Music & Utility Bot
</p>

<a class="btn"
href="https://discord.com/oauth2/authorize?client_id=1514253026964279377&permissions=8&integration_type=0&scope=bot+applications.commands">
Invite ZyroX
</a>
</div>

<div class="features">
<h2>Features</h2>

<div class="card">
<img src="https://cdn.discordapp.com/emojis/1515881403861045288.webp">
Advanced Features
</div>

<div class="card">
<img src="https://cdn.discordapp.com/emojis/1515884085581447228.webp">
Anti-Nuke Protection
</div>

<div class="card">
<img src="https://cdn.discordapp.com/emojis/1515881571289141298.webp">
Automation Tools
</div>

<div class="card">
<img src="https://cdn.discordapp.com/emojis/1515881363662835712.webp">
High Quality Music
</div>

<div class="card">
🎀 24/7 Uptime
</div>

</div>

<footer>
© 2026 ZyroX • Advanced Discord Bot
</footer>

</body>
</html>
