<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyroX Bot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

/* Animated Gradient Background */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(
-45deg,
#5865F2,
#9b59ff,
#00d4ff,
#ff4d6d
);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
z-index:-3;
}

/* Floating Glow 1 */
body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:#5865F2;
filter:blur(180px);
border-radius:50%;
top:-100px;
left:-100px;
animation:float1 12s ease-in-out infinite;
opacity:.35;
z-index:-2;
}

/* Floating Glow 2 */
.glow{
position:fixed;
width:450px;
height:450px;
background:#ff4d6d;
filter:blur(180px);
border-radius:50%;
bottom:-100px;
right:-100px;
animation:float2 14s ease-in-out infinite;
opacity:.3;
z-index:-2;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes float1{
0%,100%{
transform:translate(0,0);
}
50%{
transform:translate(250px,180px);
}
}

@keyframes float2{
0%,100%{
transform:translate(0,0);
}
50%{
transform:translate(-250px,-180px);
}
}

.hero{
padding:120px 20px;
}

h1{
font-size:80px;
background:linear-gradient(
90deg,
#ffffff,
#b9c6ff,
#ffffff
);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:textGlow 4s linear infinite;
}

@keyframes textGlow{
0%{background-position:0% center;}
100%{background-position:200% center;}
}

.subtitle{
margin-top:15px;
font-size:20px;
color:#e0e0e0;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:#5865F2;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:14px;
box-shadow:0 0 25px #5865F2;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.support-btn{
display:block;
width:fit-content;
margin:15px auto 0;
background:#ff4d6d;
box-shadow:0 0 25px #ff4d6d;
}

.features{
padding:60px 20px;
}

.features h2{
margin-bottom:25px;
font-size:35px;
}

.card{
max-width:500px;
margin:15px auto;
padding:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
border-radius:18px;
transition:.3s;
font-size:18px;
box-shadow:0 0 20px rgba(255,255,255,.08);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

footer{
margin-top:50px;
padding:20px;
color:#d0d0d0;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="hero">

<h1>ZyroX</h1>

<p class="subtitle">
Advanced Discord Music & Utility Bot
</p>

<a class="btn"
href="https://discord.com/oauth2/authorize?client_id=1514253026964279377&permissions=8&integration_type=0&scope=bot+applications.commands"
target="_blank">
🎀 Invite ZyroX
</a>

<a class="btn support-btn"
href="https://discord.gg/GaK3S8BFJB"
target="_blank">
💖 Support Server
</a>

</div>

<div class="features">

<h2>Features</h2>

<div class="card">✅ Advanced Features</div>

<div class="card">🎯 Anti-Nuke Protection</div>

<div class="card">⚒️ Automation Tools</div>

<div class="card">🎼 High Quality Music</div>

<div class="card">🎀 24/7 Uptime</div>

</div>

<footer>
© 2026 ZyroX • Advanced Discord Bot
</footer>

</body>
</html>
