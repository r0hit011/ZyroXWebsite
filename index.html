<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyroX Bot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

/* Animated Black Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(88,101,242,.35), transparent 25%),
radial-gradient(circle at 80% 30%, rgba(255,0,170,.25), transparent 25%),
radial-gradient(circle at 50% 80%, rgba(0,255,255,.20), transparent 25%);
animation:bgMove 12s ease-in-out infinite alternate;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 150px,#fff,transparent),
radial-gradient(1px 1px at 200px 80px,#fff,transparent),
radial-gradient(2px 2px at 300px 220px,#fff,transparent),
radial-gradient(1px 1px at 400px 120px,#fff,transparent);
background-size:500px 500px;
animation:stars 20s linear infinite;
opacity:.4;
z-index:-1;
}

@keyframes bgMove{
0%{
transform:scale(1) translate(0,0);
}
100%{
transform:scale(1.2) translate(-40px,40px);
}
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(-500px);
}
}

/* Logo */
.logo{
width:180px;
height:180px;
object-fit:cover;
border-radius:50%;
border:4px solid rgba(255,255,255,0.15);
box-shadow:
0 0 20px #5865F2,
0 0 40px #9b59ff;
margin-bottom:20px;
animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

/* Hero Section */
.hero{
padding:80px 20px;
}

h1{
font-size:80px;
background:linear-gradient(
90deg,
#5865F2,
#9b59ff,
#ffffff,
#5865F2
);
background-size:300% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:textGlow 4s linear infinite;
}

@keyframes textGlow{
0%{background-position:0% center;}
100%{background-position:300% center;}
}

.subtitle{
margin-top:15px;
font-size:20px;
color:#cfcfcf;
}

/* Buttons */
.btn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:#5865F2;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:14px;
box-shadow:0 0 25px #5865F2;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.support-btn{
display:block;
width:fit-content;
margin:15px auto 0;
background:#ff4d6d;
box-shadow:0 0 25px #ff4d6d;
}

/* Features */
.features{
padding:60px 20px;
}

.features h2{
font-size:35px;
margin-bottom:25px;
}

.card{
max-width:500px;
margin:15px auto;
padding:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
font-size:18px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,255,255,.15);
}

footer{
margin-top:50px;
padding:20px;
color:#999;
}
</style>
</head>

<body>

<div class="hero">

<img src="https://i.ibb.co/VchB4Mcf/Zyro-Xav.jpg" alt="ZyroX Logo" class="logo">

<h1>ZyroX</h1>

<p class="subtitle">
Advanced Discord Music & Utility Bot
</p>

<a class="btn"
href="https://discord.com/oauth2/authorize?client_id=1514253026964279377&permissions=8&integration_type=0&scope=bot+applications.commands"
target="_blank">
🎀 Invite ZyroX
</a>

<a class="btn support-btn"
href="https://discord.gg/GaK3S8BFJB"
target="_blank">
💖 Support Server
</a>

</div>

<div class="features">

<h2>Features</h2>

<div class="card">
✅ Advanced Features
</div>

<div class="card">
🎯 Anti-Nuke Protection
</div>

<div class="card">
⚒️ Automation Tools
</div>

<div class="card">
🎼 High Quality Music
</div>

<div class="card">
🎀 24/7 Uptime
</div>

</div>

<footer>
© 2026 ZyroX • Advanced Discord Bot
</footer>

</body>
</html>
